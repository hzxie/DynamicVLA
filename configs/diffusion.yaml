CONST:
  EXP_NAME: null
  N_WORKERS: 8
  POLICY_NAME: "diffusion"

DATASET:
  NAME: "lerobot/hzxie/dynamic-objects"
  PIN_MEMORY: false
  USE_DELTA_ACTION: true
  IMG_SIZE: [224, 224]
  DELTA_TIMESTAMPS:
  REQUIRED_FEATURES:
    - "observation.images.gripper_cam"
    - "observation.images.side_cam"
    - "observation.state"
    - "action"

DIR:
  OUTPUT: "./runs"

WANDB:
  ENABLED: false
  PROJECT: "DynamicVLA"
  ENTITY: "haozhexie"
  MODE: "online"
  RUN_ID: null
  LOG_CODE: true
  SYNC_TENSORBOARD: false

TRAIN:
  N_EPOCHS: 500
  BATCH_SIZE: 64
  CKPT_SAVE_FREQ: 20
  OPTIMIZER:
    LR: 1.0e-4
    EPS: 1.0e-8
    WEIGHT_DECAY: 1.0e-06
    BETAS: [0.95, 0.999]
  LR_SCHEDULER:
    NAME: "cosine"
    N_WARMUP_STEPS: 500
  IMAGE_TRANSFORMS:
    BRIGHTNESS: [0.8, 1.2]
    CONTRAST: [0.8, 1.2]
    SATURATION: [0.5, 1.5]
    HUE: [-0.05, 0.05]
    SHARPNESS: [0.5, 1.5]