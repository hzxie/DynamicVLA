# transformers: 4.53.3
CONST:
  EXP_NAME: null
  N_WORKERS: 8

DATASET:
  NAME: "hzxie/dynamic-objects"
  PIN_MEMORY: false
  USE_DELTA_ACTION: true
  IMG_SIZE:
  DELTA_TIMESTAMPS:
    observation: [-2, 0]
  REQUIRED_FEATURES:
    - "observation.images.opst_cam"
    - "observation.images.wrist_cam"
    - "observation.state"
    - "action"

POLICY:
  TYPE: "dynamicvla"
  CHECKPOINT:
  N_OBS_STEPS: 2
  CHUNK_SIZE: 10
  N_ACTION_STEPS: 10
  RESIZE_IMGS_WITH_PADDING:
  VLM_MODEL_NAME: "HuggingFaceTB/SmolLM2-360M"
  FREEZE_VISION_MODEL: true
  FREEZE_CONNECTOR: true
  FREEZE_TEXT_MODEL: true

DIR:
  OUTPUT: "./runs"

WANDB:
  ENABLED: false
  PROJECT: "DynamicVLA"
  ENTITY: "haozhexie"
  MODE: "online"
  RUN_ID: null
  LOG_CODE: true
  SYNC_TENSORBOARD: false

TRAIN:
  N_EPOCHS: 500
  BATCH_SIZE: 44
  GRAD_ACCUM_STEPS: 1
  CKPT_SAVE_FREQ:
    EPOCH: 5
    BATCH: 0
  OPTIMIZER:
    LR: 1.0e-4
    EPS: 1.0e-8
    WEIGHT_DECAY: 1.0e-10
    BETAS: [0.9, 0.95]
  LR_SCHEDULER:
    NAME: "cosine"
    N_WARMUP_STEPS: 1000
  IMAGE_TRANSFORMS:
    BRIGHTNESS: [0.8, 1.2]
    CONTRAST: [0.8, 1.2]
    SATURATION: [0.5, 1.5]
    HUE: [-0.05, 0.05]
    SHARPNESS: [0.5, 1.5]