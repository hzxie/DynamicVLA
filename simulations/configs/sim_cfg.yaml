scene:
  cameras:
    - name: "opst_cam"
      position: [1, 0, 0.6]
      rotation: [0, 60, 90]
      prim_path: "/Robot/OppositeCamera"
    - name: "side_cam"
      position: [0.5, 1, 0.35]
      rotation: [-90, 0, 180]
      prim_path: "/Robot/SideCamera"
  table:
    friction: [0, 1]
  objects:
    n_objects: 1
    mass: 0.05
    prob_rnd_quat: 0.85
    prob_static: 0.5
    moving_time: [0.5, 1.5]
    categories:
      - apple
      - avocado
      - beer
      - bottle
      - can
      - cup
      - egg
      - kiwi
      - lemon
      - lime
      - onion
      - orange
      - peach
      - potato
      - tangerine
      - tomato
  containers:
    n_containers: 1
    mass: 0.1
    categories:
      - bowl
      - box
      - plate
      - tray

camera:
  width: 480
  height: 360
  fps: 25
  focal_length: 2.3
  focus_distance: 400
  horizontal_aperture: 4.6
  clip:
    near: 0.01
    far: 10000
  data_types:
    - rgb
    - semantic_segmentation
    # - depth

lighting:
  temperature: [4000, 8000]
  intensity: [150, 750]
  position:
    x: [-50, 50]
    y: [-50, 50]
    z: [10, 20]

tasks:
  pick:
    sm: "state_machines.pick_sm.PickStateMachine"
    episode_length: 10
  place:
    sm: "state_machines.place_sm.PlaceStateMachine"
    episode_length: 12

robots:
  franka:
    init_pose: [0.465906, 0.0, 0.382970, 0.008583, 0.921765, 0.020404, 0.387116]
    final_pose: [0.3, 0, 0.3, -1, 0, 0, 0]
    gripper_length: 0.045
    max_reach_dist: 0.75
  piper:
    init_pose: [0.373, 0.0, 0.271, 0.0, 0.9739, 0.0, 0.227]
    final_pose: [0.373, 0.0, 0.271, -1, 0, 0, 0]
    gripper_length: 0.09
    max_reach_dist: 0.55
