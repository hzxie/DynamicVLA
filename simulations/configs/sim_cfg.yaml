scene:
  table:
    max_children: 3
    max_height: 1.5
    min_wh_sum: 2
  target_object:
    categories:
      - can
    moving_time: [0.05, 2]
  other_objects:
    n_objects: 0
    categories:
      - apple

camera:
  width: 480
  height: 360
  fps: 100
  focal_length: 2.3
  focus_distance: 400
  horizontal_aperture: 4.6
  clip:
    near: 0.01
    far: 10000
  data_types:
    - rgb
    - depth
    - semantic_segmentation

lighting:
  temperature: [5000, 7500]
  intensity: [350, 650]
  position:
    x: [-20, 20]
    y: [-20, 20]
    z: [10, 20]